<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Arjuns: Learn and Grow — Smart kids. Good hearts.</title>
<meta name="description" content="Little Arjuns: Learn and Grow — Part 1 of Life Learnings for ages 3–8. Maths, language and values. No ads, no data collection. Made in India.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FDFBF5;
    --ink:#26324B;
    --ink-soft:#4A5670;
    --haldi:#D98E1B;
    --haldi-deep:#B87310;
    --haldi-soft:#FBF1DC;
    --peacock:#0E6B63;
    --line:#E8E2D4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--paper);color:var(--ink);
    font-family:"Source Sans 3",system-ui,sans-serif;
    line-height:1.6;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:0 22px;text-align:center;
  }
  .hero{max-width:640px;padding:64px 0 24px}
  .dog{font-size:3.2rem;line-height:1}
  h1{
    font-family:"Baloo 2",system-ui,sans-serif;font-weight:800;
    font-size:clamp(2rem,7vw,3rem);line-height:1.15;
    margin:14px 0 4px;
  }
  h1 .grow{color:var(--haldi)}
  .part{
    font-family:"Baloo 2",system-ui,sans-serif;font-weight:600;
    color:var(--peacock);font-size:1.02rem;letter-spacing:.03em;
    margin-bottom:14px;
  }
  .tag{font-size:1.15rem;color:var(--ink-soft);margin-bottom:30px}
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:34px}
  .chip{
    background:var(--haldi-soft);border:1.5px solid var(--haldi);
    border-radius:999px;padding:7px 16px;
    font-weight:600;font-size:.95rem;color:var(--ink);
  }
  .soon{
    display:inline-block;background:var(--ink);color:var(--paper);
    border-radius:12px;padding:12px 22px;
    font-family:"Baloo 2",system-ui,sans-serif;font-weight:700;
    font-size:1.02rem;
  }
  .footer{
    margin-top:auto;padding:36px 0 28px;color:var(--ink-soft);
    font-size:.93rem;border-top:1px solid var(--line);width:100%;max-width:640px;
  }
  .footer a{color:var(--peacock)}
</style>
</head>
<body>
  <div class="hero">
    <div class="dog">🐕</div>
    <div class="part">Part 1 of Life Learnings · Ages 3–8</div>
    <h1>Little Arjuns:<br>Learn and <span class="grow">Grow</span></h1>
    <p class="tag">Smart kids. Good hearts. Made in India. 🇮🇳</p>
    <div class="chips">
      <span class="chip">🚫 No ads</span>
      <span class="chip">🔒 No data collection</span>
      <span class="chip">❤️ Values + academics</span>
    </div>
    <span class="soon">Coming soon to Google Play 🐾</span>
  </div>
  <div class="footer">
    <p><a href="/privacy">Privacy Policy</a> · Contact: <a href="mailto:abhi.arjun231@gmail.com">abhi.arjun231@gmail.com</a></p>
    <p>© 2026 ParthSarthi</p>
  </div>
</body>
</html>
